<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم البائع | جوهرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="js/theme.js"></script>
    <script src="js/layout.js"></script>
</head>
<body class="theme-transition bg-primary text-primary">
    <script src="js/api.js"></script>
    <script>
        // Check authentication and seller role
        if (checkAuth()) {
            const user = api.getUser();
            if (user.account_type !== 'seller') {
                window.location.href = '../index.html';
            }
        }
    </script>
    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <!-- Sidebar -->


        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Dashboard Header -->


            <!-- Dashboard Content -->
            <div class="dashboard-content">
                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <div>
                                <div class="stat-card-value" id="total-products">0</div>
                                <div class="stat-card-label">إجمالي المنتجات</div>
                            </div>
                            <div class="stat-card-icon blue">
                                <i class="fas fa-box"></i>
                            </div>
                        </div>
                        <div class="stat-card-change positive">
                            <i class="fas fa-arrow-up"></i>
                            <span>منتجاتك النشطة</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-card-header">
                            <div>
                                <div class="stat-card-value" id="active-auctions">0</div>
                                <div class="stat-card-label">المزادات النشطة</div>
                            </div>
                            <div class="stat-card-icon green">
                                <i class="fas fa-gavel"></i>
                            </div>
                        </div>
                        <div class="stat-card-change">
                            <i class="fas fa-fire"></i>
                            <span>مزادات جارية</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-card-header">
                            <div>
                                <div class="stat-card-value" id="total-sales">0</div>
                                <div class="stat-card-label">إجمالي المبيعات</div>
                            </div>
                            <div class="stat-card-icon gold">
                                <i class="fas fa-dollar-sign"></i>
                            </div>
                        </div>
                        <div class="stat-card-change positive">
                            <i class="fas fa-arrow-up"></i>
                            <span>ر.س</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-card-header">
                            <div>
                                <div class="stat-card-value" id="total-views">0</div>
                                <div class="stat-card-label">المشاهدات</div>
                            </div>
                            <div class="stat-card-icon red">
                                <i class="fas fa-eye"></i>
                            </div>
                        </div>
                        <div class="stat-card-change positive">
                            <i class="fas fa-arrow-up"></i>
                            <span>مشاهدات منتجاتك</span>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <a href="./add-product.html" class="block">
                        <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl shadow-lg p-8 text-white hover:shadow-xl transition">
                            <i class="fas fa-plus-circle text-4xl mb-4"></i>
                            <h3 class="text-2xl font-bold mb-2">إضافة منتج جديد</h3>
                            <p class="text-blue-100">أضف منتجاتك الثمينة للبيع</p>
                        </div>
                    </a>

                    <a href="./create-auction.html" class="block">
                        <div class="bg-gradient-to-r from-green-500 to-green-600 rounded-xl shadow-lg p-8 text-white hover:shadow-xl transition">
                            <i class="fas fa-gavel text-4xl mb-4"></i>
                            <h3 class="text-2xl font-bold mb-2">إنشاء مزاد جديد</h3>
                            <p class="text-green-100">ابدأ مزاداً لمنتجاتك</p>
                        </div>
                    </a>
                </div>

                <!-- Tabs -->
                <div class="bg-secondary border border-color rounded-xl overflow-hidden">
                    <div class="border-b border-color overflow-x-auto">
                        <nav class="flex min-w-max">
                            <button onclick="switchTab('products')" id="tab-products" class="tab-btn px-6 py-4 font-semibold border-b-2 border-gold text-gold whitespace-nowrap">
                                <i class="fas fa-box ml-2"></i>
                                منتجاتي
                            </button>
                            <button onclick="switchTab('auctions')" id="tab-auctions" class="tab-btn px-6 py-4 font-semibold text-secondary hover:text-primary whitespace-nowrap">
                                <i class="fas fa-gavel ml-2"></i>
                                مزاداتي
                            </button>
                        </nav>
                    </div>

                    <!-- Products Tab -->
                    <div id="content-products" class="tab-content p-6">
                        <div id="products-list" class="space-y-4">
                            <div class="text-center py-12 text-secondary">
                                <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
                                <p>جاري تحميل المنتجات...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Auctions Tab -->
                    <div id="content-auctions" class="tab-content p-6 hidden">
                        <div id="auctions-list" class="space-y-4">
                            <div class="text-center py-12 text-secondary">
                                <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
                                <p>جاري تحميل المزادات...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>


    <script src="dashboard.js"></script>
    <script>
        // ... (previous code)

        function displayProducts(products) {
            const container = document.getElementById('products-list');
            
            if (products.length === 0) {
                 // ... (empty state)
            }

            container.innerHTML = products.map(product => `
                <div class="border border-color rounded-lg p-4 hover:shadow-md transition bg-tertiary">
                    <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                        <div class="flex-1 w-full">
                            <h3 class="text-lg font-bold text-primary">${product.name}</h3>
                            <p class="text-secondary text-sm mt-1">${product.description.substring(0, 100)}...</p>
                            <div class="flex flex-wrap gap-4 mt-3 text-sm">
                                <span class="text-green-500 font-bold">${product.price} ر.س</span>
                                <span class="text-secondary">المخزون: ${product.stock}</span>
                                <span class="text-secondary">المشاهدات: ${product.views_count}</span>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto justify-end">
                            <button onclick="editProduct(${product.id})" class="text-blue-500 hover:text-blue-700 bg-blue-500 bg-opacity-10 p-2 rounded-lg">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteProduct(${product.id})" class="text-red-500 hover:text-red-700 bg-red-500 bg-opacity-10 p-2 rounded-lg">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayAuctions(auctions) {
            const container = document.getElementById('auctions-list');
            // ... (empty state check)

            container.innerHTML = auctions.map(auction => `
                <div class="border border-color rounded-lg p-4 hover:shadow-md transition bg-tertiary">
                    <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                        <div class="flex-1 w-full">
                            <h3 class="text-lg font-bold text-primary">${auction.product.name}</h3>
                            <div class="flex flex-wrap gap-4 mt-3 text-sm">
                                <span class="text-green-500 font-bold">السعر الحالي: ${auction.current_price} ر.س</span>
                                <span class="text-secondary">عدد المزايدات: ${auction.total_bids}</span>
                                <span class="px-3 py-1 rounded-full text-xs ${
                                    auction.status === 'active' ? 'bg-green-500 bg-opacity-20 text-green-500' :
                                    auction.status === 'pending' ? 'bg-yellow-500 bg-opacity-20 text-yellow-500' :
                                    'bg-gray-500 bg-opacity-20 text-gray-500'
                                }">${
                                    auction.status === 'active' ? 'نشط' :
                                    auction.status === 'pending' ? 'في انتظار الموافقة' :
                                    auction.status === 'ended' ? 'منتهي' : 'ملغي'
                                }</span>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto justify-end">
                            ${auction.status === 'pending' ? `
                                <button onclick="editAuction(${auction.id})" class="text-blue-500 hover:text-blue-700 bg-blue-500 bg-opacity-10 p-2 rounded-lg">
                                    <i class="fas fa-edit"></i>
                                </button>
                            ` : ''}
                            <button onclick="cancelAuction(${auction.id})" class="text-red-500 hover:text-red-700 bg-red-500 bg-opacity-10 p-2 rounded-lg">
                                <i class="fas fa-ban"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-gold', 'text-gold');
                btn.classList.add('text-secondary');
            });
            document.getElementById(`tab-${tab}`).classList.add('border-gold', 'text-gold');
            document.getElementById(`tab-${tab}`).classList.remove('text-secondary');

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(`content-${tab}`).classList.remove('hidden');
        }

        async function deleteProduct(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
            
            try {
                await api.deleteProduct(id);
                ui.showSuccess('تم حذف المنتج بنجاح');
                loadDashboard();
            } catch (error) {
                ui.showError(error.message || 'فشل حذف المنتج');
            }
        }

        async function cancelAuction(id) {
            if (!confirm('هل أنت متأكد من إلغاء هذا المزاد؟')) return;
            
            try {
                await api.cancelAuction(id);
                ui.showSuccess('تم إلغاء المزاد بنجاح');
                loadDashboard();
            } catch (error) {
                ui.showError(error.message || 'فشل إلغاء المزاد');
            }
        }

        // Load Dashboard Data
        async function loadDashboard() {
            try {
                // parallel helper for cleaner code? or just await one by one
                // 1. Load Stats
                // If getSellerStatistics exists, use it. Otherwise count manually from arrays
                // Let's try to get specific data if endpoints are robust.
                
                // Fetch Products
                const productsResponse = await api.getMyProducts();
                // Handle pagination if present (response.data.data) or simple array (response.data)
                let products = [];
                if (productsResponse.data && Array.isArray(productsResponse.data)) {
                    products = productsResponse.data;
                } else if (productsResponse.data && productsResponse.data.data && Array.isArray(productsResponse.data.data)) {
                    products = productsResponse.data.data;
                }
                
                displayProducts(products);

                // Fetch Auctions
                const auctionsResponse = await api.getMyAuctions();
                let auctions = [];
                if (auctionsResponse.data && Array.isArray(auctionsResponse.data)) {
                    auctions = auctionsResponse.data;
                } else if (auctionsResponse.data && auctionsResponse.data.data && Array.isArray(auctionsResponse.data.data)) {
                    auctions = auctionsResponse.data.data;
                }

                displayAuctions(auctions);

                // Update Stats
                document.getElementById('total-products').textContent = products.length;
                
                const activeAuctionsCount = auctions.filter(a => a.status === 'active').length;
                document.getElementById('active-auctions').textContent = activeAuctionsCount;

                // Total Views (Sum of product views?)
                // Assuming product object has views_count
                const totalViews = products.reduce((sum, p) => sum + (p.views_count || 0), 0);
                document.getElementById('total-views').textContent = totalViews;

                // Total Sales (Need earnings endpoint or calculate from sold auctions/orders)
                // Let's try getSellerEarnings or leave at 0 for now if complex
                try {
                    const earningsResponse = await api.getSellerEarnings();
                    if (earningsResponse && earningsResponse.total_earnings) {
                         document.getElementById('total-sales').textContent = earningsResponse.total_earnings;
                    }
                } catch (e) {
                    console.warn('Earnings load failed', e);
                }

            } catch (error) {
                console.error('Error loading dashboard:', error);
                ui.showError('فشل تحميل بيانات اللوحة');
            }
        }

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
