<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة منتج جديد | جوهرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="js/theme.js"></script>
    <script src="js/layout.js"></script>
</head>
<body class="theme-transition bg-primary text-primary">
    <script src="js/api.js"></script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        

        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Dashboard Content -->
            <div class="dashboard-content">
                <div class="bg-secondary rounded-xl border border-color shadow-lg p-8">
            <form id="add-product-form" class="space-y-6">
                <!-- Category -->
                <div>
                     <label class="block text-sm font-bold mb-2 text-primary">
                        <i class="fas fa-tag ml-2 text-yellow-600"></i>
                        التصنيف
                    </label>
                    <select name="category_id" required class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500">
                        <option value="">اختر التصنيف...</option>
                        <option value="1">ألماس</option>
                        <option value="2">ياقوت</option>
                        <option value="3">زمرد</option>
                        <option value="4">ياقوت أزرق</option>
                        <option value="5">عقيق</option>
                        <option value="6">توباز</option>
                        <option value="7">لؤلؤ</option>
                        <option value="8">أحجار نادرة</option>
                    </select>
                </div>

                <!-- Product Name -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-gem ml-2 text-yellow-600"></i>
                        اسم المنتج
                    </label>
                    <input type="text" name="name" required 
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                        placeholder="مثال: ياقوت أزرق نادر من سريلانكا">
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-align-right ml-2 text-yellow-600"></i>
                        الوصف
                    </label>
                    <textarea name="description" required rows="4"
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                        placeholder="وصف تفصيلي للمنتج..."></textarea>
                </div>

                <!-- Price and Stock -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-700">
                            <i class="fas fa-dollar-sign ml-2 text-yellow-600"></i>
                            السعر (ر.س)
                        </label>
                        <input type="number" name="price" required min="0" step="0.01"
                            class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                            placeholder="18500">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-700">
                            <i class="fas fa-boxes ml-2 text-yellow-600"></i>
                            الكمية المتوفرة
                        </label>
                        <input type="number" name="stock" required min="0"
                            class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                            placeholder="1">
                    </div>
                </div>

                <!-- Weight and Origin -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-700">
                            <i class="fas fa-weight ml-2 text-yellow-600"></i>
                            الوزن (قيراط) - اختياري
                        </label>
                        <input type="number" name="weight" min="0" step="0.01"
                            class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                            placeholder="5.2">
                    </div>

                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-700">
                            <i class="fas fa-globe ml-2 text-yellow-600"></i>
                            بلد المنشأ - اختياري
                        </label>
                        <input type="text" name="origin_country"
                            class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                            placeholder="سريلانكا">
                    </div>
                </div>

                <!-- Certification -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-certificate ml-2 text-yellow-600"></i>
                        الشهادة - اختياري
                    </label>
                    <input type="text" name="certification"
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                        placeholder="GIA, IGI, etc.">
                </div>

                <!-- Images Upload -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-images ml-2 text-yellow-600"></i>
                        صور المنتج
                    </label>
                    
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg bg-gray-50 hover:bg-gray-100 transition cursor-pointer" id="drop-zone">
                        <div class="space-y-1 text-center">
                            <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
                            <div class="flex text-sm text-gray-600 justify-center">
                                <label for="file-upload" class="relative cursor-pointer bg-white rounded-md font-medium text-yellow-600 hover:text-yellow-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-yellow-500">
                                    <span class="px-2">اختر صوراً</span>
                                    <input id="file-upload" name="images[]" type="file" class="sr-only" multiple accept="image/*">
                                </label>
                                <p class="pl-1">أو اسحبها هنا</p>
                            </div>
                            <p class="text-xs text-gray-500">
                                PNG, JPG, GIF حتى 5MB
                            </p>
                        </div>
                    </div>

                    <!-- Image Preview Container -->
                    <div id="image-preview-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4 hidden">
                        <!-- Previews will be added here -->
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="flex gap-4">
                    <button type="submit" class="flex-1 gold-gradient text-white font-bold py-3 px-6 rounded-lg hover:shadow-lg transition">
                        <i class="fas fa-plus ml-2"></i>
                        إضافة المنتج
                    </button>
                    <a href="./seller-dashboard.html" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-lg hover:bg-gray-300 transition text-center">
                        <i class="fas fa-times ml-2"></i>
                        إلغاء
                    </a>
                </div>
            </form>
        </div>
        </div>
            </div>
        </main>
    </div>

    <script src="./js/api.js"></script>
    <script>
        // Check authentication and seller status
        if (!api.isAuthenticated()) {
            window.location.href = '../login.html';
        }

        const user = api.getUser();
        if (user && (user.account_type !== 'seller' || !user.is_approved)) {
            // Optional: Redirect if strict role checking is needed
            // window.location.href = './seller-dashboard.html';
        }

        // File Upload Handling
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const previewContainer = document.getElementById('image-preview-container');
        let selectedFiles = [];

        // Handle Drag & Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.classList.add('border-yellow-500', 'bg-yellow-50');
        }

        function unhighlight(e) {
            dropZone.classList.remove('border-yellow-500', 'bg-yellow-50');
        }

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                previewContainer.classList.remove('hidden');
            }
            
            ([...files]).forEach(file => {
                // Validate file type and size
                if (!file.type.match('image.*')) return;
                
                selectedFiles.push(file);
                previewFile(file);
            });
        }

        function previewFile(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = function() {
                const div = document.createElement('div');
                div.className = 'relative group h-24 rounded-lg overflow-hidden border border-gray-200';
                
                div.innerHTML = `
                    <img src="${reader.result}" class="w-full h-full object-cover">
                    <button type="button" class="absolute top-1 left-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition w-6 h-6 flex items-center justify-center text-xs" onclick="removeFile(this, '${file.name}')">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-50 text-white text-xs p-1 truncate text-center">
                        ${file.name}
                    </div>
                `;
                
                previewContainer.appendChild(div);
            }
        }

        window.removeFile = function(btn, fileName) {
            selectedFiles = selectedFiles.filter(f => f.name !== fileName);
            btn.closest('div').remove();
            if (selectedFiles.length === 0) {
                previewContainer.classList.add('hidden');
                fileInput.value = ''; // Reset input
            }
        }

        // Form Submission
        document.getElementById('add-product-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitButton = this.querySelector('button[type="submit"]');
            
            // Create FormData object directly from form
            // NOTE: input[type="file"] in form only captures the last selection if changed.
            // We manually append 'selectedFiles' array to ensure all accumulated files (drag/drop + multiple selects) are included.
            const formData = new FormData(this);
            
            // Remove existing 'images[]' from FormData (which might be empty or incomplete from the input)
            formData.delete('images[]');
            
            // Append accumulated files
            selectedFiles.forEach(file => {
                formData.append('images[]', file);
            });
            
            // Ensure numeric types are correct is handled by backend validation usually,
            // but FormData sends strings. Laravel handles this fine.

            const originalBtnText = submitButton.innerHTML;

            try {
                // Show simple loading state if UI helper not available
                submitButton.disabled = true;
                submitButton.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> جاري الإضافة...';
                
                // api.createProduct now handles FormData correctly due to recent api.js update
                const response = await api.createProduct(formData);
                
                alert('تم إضافة المنتج بنجاح! ✅');
                window.location.href = './seller-dashboard.html';
                
            } catch (error) {
                console.error(error);
                submitButton.disabled = false;
                submitButton.innerHTML = originalBtnText;
                
                const msg = error.message || 'فشل إضافة المنتج';
                alert('خطأ: ' + msg);
            }
        });
    </script>
</body>
</html>
