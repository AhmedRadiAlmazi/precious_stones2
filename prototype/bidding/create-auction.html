<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء مزاد جديد | جوهرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <script src="js/theme.js"></script>
    <script src="js/layout.js"></script>
</head>
<body class="theme-transition bg-primary text-primary">
    <script src="js/api.js"></script>
    <div class="dashboard-container">
        <!-- Sidebar -->
        

        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay"></div>
        <main class="dashboard-main">
            <div class="dashboard-content">
                <div class="bg-secondary rounded-xl border border-color shadow-lg p-8">
            <form id="create-auction-form" class="space-y-6">
                <!-- Select Product -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-gem ml-2 text-yellow-600"></i>
                        اختر المنتج
                    </label>
                    <select name="product_id" id="product-select" required class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500">
                        <option value="">جاري تحميل المنتجات...</option>
                    </select>
                    <p class="text-sm text-gray-500 mt-2">
                        <i class="fas fa-info-circle ml-1"></i>
                        سيتم عرض المنتجات التي ليس لها مزادات فقط
                    </p>
                </div>

                <!-- Starting Price -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-dollar-sign ml-2 text-yellow-600"></i>
                        سعر البداية (ر.س)
                    </label>
                    <input type="number" name="starting_price" required min="0" step="0.01"
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                        placeholder="15000">
                </div>

                <!-- Reserve Price -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-shield-alt ml-2 text-yellow-600"></i>
                        السعر الاحتياطي (اختياري)
                    </label>
                    <input type="number" name="reserve_price" min="0" step="0.01"
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                        placeholder="20000">
                    <p class="text-sm text-gray-500 mt-2">
                        <i class="fas fa-info-circle ml-1"></i>
                        الحد الأدنى للسعر الذي ترغب في قبوله
                    </p>
                </div>

                <!-- Bid Increment -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-plus ml-2 text-yellow-600"></i>
                        قيمة الزيادة في المزايدة (ر.س)
                    </label>
                    <input type="number" name="bid_increment" required min="1" step="0.01" value="100"
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500"
                        placeholder="100">
                </div>

                <!-- Start Time -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-calendar-alt ml-2 text-yellow-600"></i>
                        وقت بداية المزاد
                    </label>
                    <input type="datetime-local" name="start_time" required
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500">
                </div>

                <!-- End Time -->
                <div>
                    <label class="block text-sm font-bold mb-2 text-gray-700">
                        <i class="fas fa-calendar-check ml-2 text-yellow-600"></i>
                        وقت نهاية المزاد
                    </label>
                    <input type="datetime-local" name="end_time" required
                        class="w-full bg-gray-50 border border-gray-300 rounded-lg py-3 px-4 focus:outline-none focus:border-yellow-500">
                </div>

                <!-- Info Box -->
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <h3 class="font-bold text-blue-800 mb-2">
                        <i class="fas fa-lightbulb ml-2"></i>
                        نصائح لمزاد ناجح
                    </h3>
                    <ul class="text-sm text-blue-700 space-y-1">
                        <li>• اختر سعر بداية معقول لجذب المزايدين</li>
                        <li>• حدد فترة زمنية كافية للمزاد (3-7 أيام مثالي)</li>
                        <li>• تأكد من جودة صور المنتج ووصفه</li>
                        <li>• السعر الاحتياطي يحميك من البيع بسعر منخفض</li>
                    </ul>
                </div>

                <!-- Submit Button -->
                <div class="flex flex-col md:flex-row gap-4">
                    <button type="submit" class="flex-1 gold-gradient text-white font-bold py-3 px-6 rounded-lg hover:shadow-lg transition">
                        <i class="fas fa-gavel ml-2"></i>
                        إنشاء المزاد
                    </button>
                    <a href="./seller-dashboard.html" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-lg hover:bg-gray-300 transition text-center">
                        <i class="fas fa-times ml-2"></i>
                        إلغاء
                    </a>
                </div>
            </form>
        </div>
        </div>
            </div>
        </main>
    </div>

    <script src="./js/api.js"></script>
    <script>
        // Check authentication and seller status
        if (!checkAuth()) {
            // Will redirect to login
        }

        const user = api.getUser();
        if (user.account_type !== 'seller' || !user.is_approved) {
            window.location.href = './seller-dashboard.html';
        }

        // Load products without auctions
        async function loadProducts() {
            try {
                const response = await api.getMyProducts();
                const products = response.data.data;
                
                // Filter products without auctions
                const availableProducts = products.filter(p => !p.auction);
                
                const select = document.getElementById('product-select');
                
                if (availableProducts.length === 0) {
                    select.innerHTML = '<option value="">لا توجد منتجات متاحة للمزاد</option>';
                    select.disabled = true;
                    document.querySelector('button[type="submit"]').disabled = true;
                } else {
                    select.innerHTML = '<option value="">اختر المنتج...</option>' +
                        availableProducts.map(p => 
                            `<option value="${p.id}">${p.name} - ${p.price} ر.س</option>`
                        ).join('');
                }
            } catch (error) {
                console.error('Error loading products:', error);
                ui.showError('فشل تحميل المنتجات');
            }
        }

        // Set minimum datetime to now
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        const minDateTime = now.toISOString().slice(0, 16);
        document.querySelector('input[name="start_time"]').min = minDateTime;
        document.querySelector('input[name="end_time"]').min = minDateTime;

        // Validate end time is after start time
        document.querySelector('input[name="start_time"]').addEventListener('change', function() {
            document.querySelector('input[name="end_time"]').min = this.value;
        });

        document.getElementById('create-auction-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitButton = this.querySelector('button[type="submit"]');
            const formData = new FormData(this);
            
            // Format datetime for Laravel
            const startTime = new Date(formData.get('start_time')).toISOString().slice(0, 19).replace('T', ' ');
            const endTime = new Date(formData.get('end_time')).toISOString().slice(0, 19).replace('T', ' ');
            
            const auctionData = {
                product_id: parseInt(formData.get('product_id')),
                starting_price: parseFloat(formData.get('starting_price')),
                reserve_price: formData.get('reserve_price') ? parseFloat(formData.get('reserve_price')) : null,
                bid_increment: parseFloat(formData.get('bid_increment')),
                start_time: startTime,
                end_time: endTime
            };

            try {
                ui.showLoading(submitButton);
                
                const response = await api.createAuction(auctionData);
                
                ui.showSuccess('تم إنشاء المزاد بنجاح!');
                
                setTimeout(() => {
                    window.location.href = './seller-dashboard.html';
                }, 1500);
                
            } catch (error) {
                ui.hideLoading(submitButton);
                
                if (error.errors) {
                    ui.showValidationErrors(error.errors, this);
                } else {
                    ui.showError(error.message || 'فشل إنشاء المزاد');
                }
            }
        });

        // Load products on page load
        loadProducts();
    </script>
</body>
</html>
